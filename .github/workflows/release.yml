name: Build and Release Chrome Extension

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Extension ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP file
        # Použijeme github.ref_name pro dynamický název souboru
        run: |
          zip -r "privacy_bulk_actions_for_caflou-${{ github.ref_name }}.zip" manifest.json content.js icons/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          # Musí se shodovat s názvem vytvořeným v předchozím kroku
          files: "privacy_bulk_actions_for_caflou-${{ github.ref_name }}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
